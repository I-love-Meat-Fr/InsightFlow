# InsightFlow scrape targets — adjust selectors for each real site.
# kind: httpx (static HTML) | playwright (JS-heavy)
# engine defaults to kind if omitted.

defaults:
  timeout_seconds: 30
  max_concurrent: 20
  user_agent: "InsightFlow/0.1 (educational; respect robots.txt)"

targets:
  - id: "tgdd_mobile"
    kind: "playwright"
    urls:
      - "https://www.thegioididong.com/dtdd"
    selectors:
      max_items: 1000
      wait_for: "ul.listproduct"
      item: "li.item"
      title_within: "h3"
      price_within: ".price"
      original_price_within: ".price-old"
      link_within: "a.main-contain"
  - id: "tgdd_flash_sale"
    kind: "playwright"    
    urls:
      - "https://www.thegioididong.com/flashsale" 
    selectors:
      wait_for: "div.item" 
      # Lấy thẻ div chứa link sản phẩm
      item: "div.item"
      # Tên sản phẩm
      title_within: "h3, .name"
      # Giá 
      price_within: ".price, strong, .giacu"
      # Giá cũ
      original_price_within: ".price-old"
      # Link sản phẩm
      link_within: "a"
  - id: "cellphones"
    kind: "playwright"
    urls:
      - "https://cellphones.com.vn/mobile.html"
    selectors:
      max_items: 1009
      wait_for: ".product-item, .product-info"
      item: ".product-item, .product-info, .product-info-container"
      title_within: ".product__name, h3, .name"
      price_within: ".product__price--show, .price, .show-price"
      original_price_within: ".product__price--through, .price-old"
      link_within: "a"
