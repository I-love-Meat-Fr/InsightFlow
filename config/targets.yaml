# InsightFlow scrape targets — adjust selectors for each real site.
# kind: httpx (static HTML) | playwright (JS-heavy)
# engine defaults to kind if omitted.

defaults:
  timeout_seconds: 30
  max_concurrent: 20
  user_agent: "InsightFlow/0.1 (educational; respect robots.txt)"

targets:
  - id: books_toscrape_listing
    kind: httpx
    urls:
      - "https://books.toscrape.com/"
    # Chúng ta định nghĩa đây là dạng danh sách (listing)
    listing:
      item_selector: "article.product_pod" 
      selectors:
        title: "h3 a"           # Sẽ lấy text hoặc attribute title
        price: "p.price_color"  # Lấy giá tiền kèm ký hiệu bảng Anh
        link: "h3 a"            # Lấy đường dẫn chi tiết
        availability: ".availability" # Kiểm tra còn hàng hay không
  - id: "tgdd_flash_sale"
    kind: "playwright"    
    urls:
      - "https://www.thegioididong.com/flashsale" 
    selectors:
      wait_for: "div.item" 
      # Lấy thẻ div chứa link sản phẩm
      item: "div.item"
      # Tên sản phẩm
      title_within: "h3, .name"
      # Giá 
      price_within: ".price, strong, .giacu"
      # Giá cũ
      original_price_within: ".price-old"
      # Link sản phẩm
      link_within: "a"
  # # Example: JS-heavy listing (Playwright) — tune wait_selector for your site
